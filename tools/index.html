    body { background:#0b1220; color:#e2e8f0; font-family:'Inter',sans-serif; }
    .card { background:#111a2e; border:1px solid #1e293b; transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease; }
    .card:hover { transform:translateY(-3px); border-color:#334155; box-shadow:0 12px 28px -12px rgba(0,0,0,.6); }
    .card.soon { opacity:.55; }
    .card.soon:hover { transform:none; box-shadow:none; border-color:#1e293b; }
    .badge-soon { background:rgba(148,163,184,.12); color:#94a3b8; }
    .badge-live { background:rgba(34,197,94,.12); color:#4ade80; }
  </style>

<body>
  <header class="max-w-6xl mx-auto px-5 pt-8 pb-2">
    <a href="../index.html" class="text-slate-400 hover:text-slate-200 text-sm"><i class="fa-solid fa-arrow-left mr-1"></i>Back to Portfolio</a>
    <h1 class="font-display font-extrabold text-3xl md:text-4xl mt-5 mb-2" style="color:#f1f5f9">Free Online Tools</h1>
    <p class="text-slate-400 max-w-2xl text-sm md:text-base leading-relaxed">
      Fast, private, browser-based utilities. Nothing is uploaded — everything runs in your browser. No signup, no tracking.
    </p>
  </header>

  <main class="max-w-6xl mx-auto px-5 py-8">
    <div id="tool-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    <p class="text-slate-500 text-xs mt-10 text-center">Built by Ajay Kakkar · 100% client-side · open in any modern browser</p>
  </main>

  <script>
    const tools = [
      { name:"Finance Calculators", desc:"SIP, EMI, stock P&L, CAGR, home &amp; car loan with amortization.", href:"finance/index.html", icon:"fa-indian-rupee-sign", color:"#4ade80", live:true },
      { name:"PDF Tools", desc:"Convert PDF to image, merge, split and extract pages.", href:"pdf/index.html", icon:"fa-file-pdf", color:"#f87171", live:true },
      { name:"Qlik Sense Guides", desc:"Upgrade guide, release notes and PostgreSQL version matrix.", href:"qlik/index.html", icon:"fa-chart-column", color:"#34d399", live:true },
      { name:"JSON Tools", desc:"Format, validate, minify, tree view, JSON↔CSV↔YAML, JSONPath.", href:"json/index.html", icon:"fa-code", color:"#fbbf24", live:true },
      { name:"Dev / Text Tools", desc:"Base64, URL encode, UUID, JWT decode, regex tester.", href:"text/index.html", icon:"fa-terminal", color:"#93c5fd", live:true },
      { name:"Color Tools", desc:"Picker, palette, HEX↔RGB↔HSL, WCAG contrast checker.", href:"color/index.html", icon:"fa-palette", color:"#c4b5fd", live:true },
      { name:"Text Utilities", desc:"Word count, case convert, diff, lorem ipsum, slugify.", href:"text-utils/index.html", icon:"fa-font", color:"#a5b4fc", live:true },
      { name:"Crypto / Encode", desc:"AES encrypt/decrypt, password generator, hashing.", href:"crypto/index.html", icon:"fa-shield-halved", color:"#fb923c", live:true },
      { name:"SQL Formatter", desc:"Beautify and minify SQL, dialect-aware.", href:"sql/index.html", icon:"fa-database", color:"#67e8f9", live:true },
      { name:"Unit Converter", desc:"Length, weight, data, temperature + live currency.", href:"converter/index.html", icon:"fa-right-left", color:"#fcd34d", live:true },
      { name:"QR Generator", desc:"Generate QR codes &amp; 1D barcodes, styled, downloadable.", href:"qr/index.html", icon:"fa-qrcode", color:"#f9a8d4", live:true },
      { name:"Image OCR", desc:"Extract text from images, in-browser, multi-language.", href:"ocr/index.html", icon:"fa-image", color:"#5eead4", live:true },
      { name:"Markdown Tools", desc:"Live preview, MD→HTML, table generator, MD→PDF.", href:"markdown/index.html", icon:"fa-markdown", color:"#94a3b8", live:true, brand:true },
      { name:"Image Tools", desc:"Resize, crop, compress, convert PNG↔WebP↔JPG, favicon.", href:"image/index.html", icon:"fa-crop-simple", color:"#fda4af", live:true },
      { name:"Date / Time Calc", desc:"Age, duration, working days, cron parser, epoch↔date.", href:"datetime/index.html", icon:"fa-calendar-days", color:"#7dd3fc", live:true }
    ];
    const grid = document.getElementById("tool-grid");
    grid.innerHTML = tools.map(t => {
      const iconPrefix = t.brand ? "fa-brands" : "fa-solid";
      const badge = t.live
        ? '<span class="badge-live text-[10px] font-semibold px-2 py-0.5 rounded-full">LIVE</span>'
        : '<span class="badge-soon text-[10px] font-semibold px-2 py-0.5 rounded-full">SOON</span>';
      const inner = `
        <div class="flex items-start justify-between mb-3">
          <span class="inline-flex items-center justify-center w-11 h-11 rounded-xl text-lg" style="background:${t.color}1a;color:${t.color}">
            <i class="${iconPrefix} ${t.icon}"></i>
          </span>
          ${badge}
        </div>
        <h2 class="font-display font-semibold text-base mb-1" style="color:#f1f5f9">${t.name}</h2>
        <p class="text-slate-400 text-sm leading-relaxed">${t.desc}</p>`;
      return t.live
        ? `<a href="${t.href}" class="card rounded-2xl p-5 block no-underline">${inner}</a>`
        : `<div class="card soon rounded-2xl p-5">${inner}</div>`;
    }).join("");
  </script>
