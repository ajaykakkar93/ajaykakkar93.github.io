    const grid = document.getElementById("tool-grid");
    let activeCat = "All";

    function card(t){
      const iconPrefix = t.brand ? "fa-brands" : "fa-solid";
      const inner = `
        <div class="flex items-start justify-between mb-3">
          <span class="inline-flex items-center justify-center w-11 h-11 rounded-xl text-lg" style="background:${t.color}1a;color:${t.color}">
            <i class="${iconPrefix} ${t.icon}"></i>
          </span>
          <span class="badge-live text-[10px] font-semibold px-2 py-0.5 rounded-full">LIVE</span>
        </div>
        <h2 class="font-display font-semibold text-base mb-1" style="color:#f1f5f9">${t.name}</h2>
        <p class="text-slate-400 text-sm leading-relaxed">${t.desc}</p>`;
      return `<a href="${t.href}" class="card rounded-2xl p-5 block no-underline">${inner}</a>`;
    }

    function buildFilters(){
      const cats = CAT_ORDER.filter(c => tools.some(t => t.cat === c));
      const chip = (label,on) => `<span class="cat-chip${on?' active':''}" onclick="setCat('${label.replace(/'/g,"\\'")}')">${label}</span>`;
      document.getElementById("cat-filters").innerHTML =
        chip("All", activeCat==="All") + cats.map(c => chip(c, activeCat===c)).join("");
    }
    function setCat(c){ activeCat = c; buildFilters(); draw(); }

    function draw(){
      const q = (document.getElementById("search").value || "").toLowerCase().trim();
      const cats = CAT_ORDER.filter(c => activeCat==="All" || c===activeCat);
      let html = "";
      let totalHits = 0;
      cats.forEach(cat => {
        const hits = tools.filter(t => t.cat===cat &&
          (t.name + " " + t.desc).toLowerCase().includes(q));
        if(!hits.length) return;
        totalHits += hits.length;
        html += `<div class="mb-7">
          <h2 class="font-display font-semibold text-sm uppercase tracking-wider mb-3" style="color:#94a3b8">
            ${cat} <span class="text-slate-600">(${hits.length})</span>
          </h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${hits.map(card).join("")}</div>
        </div>`;
      });
      grid.innerHTML = html || '<p class="text-slate-500 text-sm text-center py-10">No tools match your search.</p>';
      const countEl = document.getElementById("result-count");
      if(q) countEl.textContent = `Found ${totalHits} out of ${tools.length} tools`;
      else countEl.textContent = `${tools.length} tools available`;
    }
    buildFilters(); draw();
  </script>
