</div>
  <header class="max-w-5xl mx-auto px-5 pt-7 pb-3">
    <div class="flex items-center justify-between">
      <a href="../index.html" class="text-slate-400 hover:text-slate-200 text-sm"><i class="fa-solid fa-arrow-left mr-1"></i>All Tools</a>
      <a href="../../index.html" title="Ajay Kakkar"><img src="../../img/logo_dark.png" alt="Ajay Kakkar logo" style="width:32px;height:32px;border-radius:.4rem" /></a>
    </div>
    <h1 class="font-display font-extrabold text-2xl md:text-3xl mt-4 mb-1" style="color:#f1f5f9"><i class="fa-solid fa-quote-right mr-2" style="color:#fbbf24"></i>String Escape / Unescape</h1>
    <p class="text-slate-400 text-sm">Escape &amp; unescape for JSON, JS, HTML, SQL. Private &amp; in-browser.</p>
  </header>
  <main class="max-w-5xl mx-auto px-5 pb-12">
    <div class="flex flex-wrap gap-2 mb-3 items-center">
      <select id="fmt" class="btn rounded-lg px-3 py-1.5 text-sm"><option value="json">JSON</option><option value="js">JavaScript</option><option value="html">HTML</option><option value="sql">SQL</option></select>
      <button class="btn btn-primary rounded-lg px-3 py-1.5 text-sm" onclick="esc()">Escape →</button>
      <button class="btn rounded-lg px-3 py-1.5 text-sm" onclick="unesc()">← Unescape</button>
      <span class="flex-1"></span>
      <button class="btn rounded-lg px-3 py-1.5 text-sm" onclick="navigator.clipboard.writeText($('out').value)"><i class="fa-solid fa-copy"></i></button>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <textarea id="inp" class="panel w-full h-52 rounded-xl p-3 mono text-sm outline-none resize-none" spellcheck="false" placeholder='He said "hello" & she said <hi>!'></textarea>
      <textarea id="out" class="panel w-full h-52 rounded-xl p-3 mono text-sm outline-none resize-none" readonly></textarea>
    </div>
    <p class="text-slate-500 text-xs mt-8 text-center">100% client-side &middot; nothing uploaded &middot; by Ajay Kakkar</p>
  </main>
  <script>
    const $=id=>document.getElementById(id);
    function esc(){ const v=$('inp').value,f=$('fmt').value; let r=v;
      if(f==='json') r=JSON.stringify(v).slice(1,-1);
      else if(f==='js') r=v.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,'\\n').replace(/\r/g,'\\r').replace(/\t/g,'\\t');
      else if(f==='html'){ const d=document.createElement('div');d.textContent=v;r=d.innerHTML; }
      else r=v.replace(/'/g,"''");
      $('out').value=r; }
    function unesc(){ const v=$('inp').value,f=$('fmt').value; let r=v;
      try{
        if(f==='json') r=JSON.parse('"'+v+'"');
        else if(f==='js') r=v.replace(/\\n/g,'\n').replace(/\\r/g,'\r').replace(/\\t/g,'\t').replace(/\\'/g,"'").replace(/\\"/g,'"').replace(/\\\\/g,'\\');
        else if(f==='html'){ const d=document.createElement('div');d.innerHTML=v;r=d.textContent; }
        else r=v.replace(/''/g,"'");
      }catch(e){ r='Error: '+e.message; }
      $('out').value=r; }
  </script>
  <script>function closeDisclaimer(){var m=document.getElementById("disclaimer-modal");if(!m)return;m.style.opacity="0";setTimeout(function(){m.style.display="none";},300);}</script>
