<div id="disclaimer-modal" class="modal-overlay">

    </div>
    <p style="margin:0 0 1.5rem 0;font-size:.9rem;line-height:1.8;color:#cbd5e1;">Everything runs in your browser. Text you paste is never uploaded. 100% private.</p>

  </div>
</div>
  <header class="max-w-3xl mx-auto px-5 pt-7 pb-3">
    <div class="flex items-center justify-between">
      <a href="../index.html" class="text-slate-400 hover:text-slate-200 text-sm"><i class="fa-solid fa-arrow-left mr-1"></i>All Tools</a>
      <a href="../../index.html" title="Ajay Kakkar"><img src="../../img/logo_dark.png" alt="Ajay Kakkar logo" style="width:32px;height:32px;border-radius:.4rem" /></a>
    </div>
    <h1 class="font-display font-extrabold text-2xl md:text-3xl mt-4 mb-1" style="color:#f1f5f9"><i class="fa-solid fa-book-open mr-2" style="color:#4ade80"></i>Readability Checker</h1>
    <p class="text-slate-400 text-sm">Flesch, grade level, Gunning Fog. Private &amp; in-browser.</p>
  </header>
  <main class="max-w-3xl mx-auto px-5 pb-12">
    <section class="panel rounded-2xl p-5 space-y-3">
      <textarea id="txt" class="w-full h-40 rounded-xl p-3 text-sm outline-none resize-none" placeholder="Paste your text here…" oninput="check()"></textarea>
      <div id="out" class="grid grid-cols-2 sm:grid-cols-3 gap-3 text-sm"></div>
    </section>
    <p class="text-slate-500 text-xs mt-8 text-center">100% client-side &middot; nothing uploaded &middot; by Ajay Kakkar</p>
  </main>
  <script>
    const $=id=>document.getElementById(id);
    function syllables(w){ w=w.toLowerCase().replace(/[^a-z]/g,''); if(!w)return 0; let c=0; const v='aeiou'; let prev=false; for(const ch of w){const cur=v.includes(ch);if(cur&&!prev)c++;prev=cur;} if(w.endsWith('e')&&c>1)c--; return Math.max(1,c); }
    function check(){ const t=$('txt').value.trim(); if(!t){$('out').innerHTML='';return;}
      const words=t.match(/\b[a-zA-Z']+\b/g)||[]; const sents=(t.match(/[.!?]+/g)||[]).length||1; const wc=words.length; if(!wc)return;
      const syls=words.reduce((a,w)=>a+syllables(w),0); const asl=wc/sents; const asw=syls/wc;
      const fre=Math.round(206.835-1.015*asl-84.6*asw);
      const fkg=Math.round((0.39*asl+11.8*asw-15.59)*10)/10;
      const complex=words.filter(w=>syllables(w)>=3).length; const fog=Math.round((asl+complex/wc*100)*0.4*10)/10;
      const frdesc=fre>90?'Very Easy':fre>80?'Easy':fre>70?'Fairly Easy':fre>60?'Standard':fre>50?'Fairly Difficult':fre>30?'Difficult':'Very Difficult';
      const stat=(l,v,sub)=>`<div class="panel rounded-xl p-3" style="background:#0b1220"><div class="text-xs text-slate-400">${l}</div><div class="font-display text-xl mt-0.5" style="color:#4ade80">${v}</div><div class="text-xs text-slate-500">${sub}</div></div>`;
      $('out').innerHTML=stat('Flesch Ease',fre,frdesc)+stat('Grade Level (FK)',fkg,'US school grade')+stat('Gunning Fog',fog,'Yrs of education')+stat('Words',wc,sents+' sentences')+stat('Avg sent length',Math.round(asl)+' wds','')+stat('Avg syllables/wrd',asw.toFixed(2),''); }
  </script>
  <script>function closeDisclaimer(){var m=document.getElementById("disclaimer-modal");if(!m)return;m.style.opacity="0";setTimeout(function(){m.style.display="none";},300);}</script>
