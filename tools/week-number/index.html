</div>
  <header class="max-w-2xl mx-auto px-5 pt-7 pb-3">
    <div class="flex items-center justify-between">

    <h1 class="font-display font-extrabold text-2xl md:text-3xl mt-4 mb-1" style="color:#f1f5f9"><i class="fa-solid fa-calendar-week mr-2" style="color:#7dd3fc"></i>Week Number</h1>
    <p class="text-slate-400 text-sm">ISO week number, day of year &amp; week calendar. Private &amp; in-browser.</p>
  </header>
  <main class="max-w-2xl mx-auto px-5 pb-12">
    <section class="panel rounded-2xl p-6 space-y-4">
      <div class="flex gap-3 items-end flex-wrap">
        <div><label class="text-xs text-slate-400 block mb-1">Date</label><input type="date" id="dt" oninput="calc()"></div>
        <button class="btn rounded-lg px-3 py-1.5 text-sm" onclick="$('dt').valueAsDate=new Date();calc()">Today</button>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <div class="panel rounded-xl p-3 text-center" style="background:#0b1220"><div class="text-xs text-slate-400">Week #</div><div id="wn" class="font-display text-3xl mt-1" style="color:#7dd3fc"></div></div>
        <div class="panel rounded-xl p-3 text-center" style="background:#0b1220"><div class="text-xs text-slate-400">Day of year</div><div id="dy" class="font-display text-3xl mt-1" style="color:#fcd34d"></div></div>
        <div class="panel rounded-xl p-3 text-center" style="background:#0b1220"><div class="text-xs text-slate-400">Quarter</div><div id="qt" class="font-display text-3xl mt-1" style="color:#4ade80">Q?</div></div>
        <div class="panel rounded-xl p-3 text-center" style="background:#0b1220"><div class="text-xs text-slate-400">Days left</div><div id="dl" class="font-display text-3xl mt-1" style="color:#f87171"></div></div>
      </div>
      <div id="wrow" class="text-sm text-slate-400"></div>
    </section>
    <p class="text-slate-500 text-xs mt-8 text-center">100% client-side &middot; nothing uploaded &middot; by Ajay Kakkar</p>
  </main>
  <script>
    const $=id=>document.getElementById(id);
    function isoWeek(d){ const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=t.getUTCDay()||7; t.setUTCDate(t.getUTCDate()+4-day); const y=t.getUTCFullYear(); const w1=new Date(Date.UTC(y,0,4)); return [y,1+Math.round(((t-w1)/864e5-3+(w1.getUTCDay()||7))/7)]; }
    function dayOfYear(d){ const s=new Date(d.getFullYear(),0,0); return Math.floor((d-s)/864e5); }
    function calc(){ const v=$('dt').value; if(!v)return; const d=new Date(v+'T12:00:00');
      const[,wn]=isoWeek(d); const dy=dayOfYear(d); const q=Math.ceil((d.getMonth()+1)/3);
      const end=new Date(d.getFullYear(),11,31); const left=Math.round((end-d)/864e5);
      $('wn').textContent=wn; $('dy').textContent=dy; $('qt').textContent='Q'+q; $('dl').textContent=left;
      const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const wd=d.getDay()||7; const mon=new Date(d); mon.setDate(d.getDate()-(wd-1));
      $('wrow').innerHTML='Week '+wn+': '+Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);const hi=x.toDateString()===d.toDateString();return'<span style="margin-right:6px;'+(hi?'color:#7dd3fc;font-weight:700':'')+'">'+days[i]+' '+x.getDate()+'</span>';}).join(''); }
    $('dt').valueAsDate=new Date(); calc();
  </script>
