<body>
<div id="disclaimer-modal" class="modal-overlay">
  <div class="modal-content">
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;">

    </div>
    <p style="margin:0 0 1.5rem 0;font-size:.9rem;line-height:1.8;color:#cbd5e1;">Your password is analysed entirely in your browser and is NEVER sent anywhere. 100% private.</p>
    <div style="display:flex;justify-content:flex-end;"><button onclick="closeDisclaimer()" class="modal-btn" style="min-width:120px;">I Understand</button></div>
  </div>
</div>
  <header class="max-w-2xl mx-auto px-5 pt-7 pb-3">
    <div class="flex items-center justify-between">
      <a href="../index.html" class="text-slate-400 hover:text-slate-200 text-sm"><i class="fa-solid fa-arrow-left mr-1"></i>All Tools</a>
      <a href="../../index.html" title="Ajay Kakkar"><img src="../../img/logo_dark.png" alt="Ajay Kakkar logo" style="width:32px;height:32px;border-radius:.4rem" /></a>
    </div>
    <h1 class="font-display font-extrabold text-2xl md:text-3xl mt-4 mb-1" style="color:#f1f5f9"><i class="fa-solid fa-shield-halved mr-2" style="color:#4ade80"></i>Password Strength Checker</h1>
    <p class="text-slate-400 text-sm">Entropy, variety &amp; pattern analysis. Nothing uploaded — ever.</p>
  </header>
  <main class="max-w-2xl mx-auto px-5 pb-12">
    <section class="panel rounded-2xl p-6 space-y-4">
      <div class="relative"><input id="pwd" type="password" class="w-full pr-10 text-lg mono" placeholder="Enter a password…" oninput="check()">
        <button onclick="const f=$('pwd');f.type=f.type==='password'?'text':'password'" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 btn" style="border:none;background:none"><i class="fa-solid fa-eye text-sm"></i></button></div>
      <div class="meter"><div id="bar" style="width:0%"></div></div>
      <div id="label" class="font-display font-semibold text-lg"></div>
      <div id="detail" class="grid grid-cols-2 gap-2 text-sm"></div>
      <div id="tips" class="text-sm space-y-1"></div>
    </section>
    <p class="text-slate-500 text-xs mt-8 text-center">100% client-side &middot; nothing uploaded &middot; by Ajay Kakkar</p>
  </main>
  <script>
    const $=id=>document.getElementById(id);
    function check(){ const p=$('pwd').value; if(!p){$('bar').style.width='0%';$('label').textContent='';$('detail').innerHTML='';$('tips').innerHTML='';return;}
      let pool=0; if(/[a-z]/.test(p))pool+=26; if(/[A-Z]/.test(p))pool+=26; if(/\d/.test(p))pool+=10; if(/[^a-zA-Z0-9]/.test(p))pool+=32;
      const bits=p.length*Math.log2(pool||1); const pct=Math.min(100,bits/128*100);
      const [col,lbl]=bits<30?['#f87171','Very Weak']:bits<50?['#fbbf24','Weak']:bits<80?['#facc15','Fair']:bits<100?['#4ade80','Strong']:['#22d3ee','Very Strong'];
      $('bar').style.width=pct+'%'; $('bar').style.background=col; $('label').textContent=lbl; $('label').style.color=col;
      const stat=(k,v,ok)=>`<div class="panel rounded-lg p-2" style="background:#0b1220"><span class="text-xs text-slate-400">${k}</span><div class="mono text-sm mt-0.5" style="color:${ok?'#4ade80':'#f87171'}">${v}</div></div>`;
      $('detail').innerHTML=stat('Length',p.length,p.length>=12)+stat('Entropy',Math.round(bits)+' bits',bits>=60)+stat('Lowercase',/[a-z]/.test(p)?'✓':'✗',/[a-z]/.test(p))+stat('Uppercase',/[A-Z]/.test(p)?'✓':'✗',/[A-Z]/.test(p))+stat('Numbers',/\d/.test(p)?'✓':'✗',/\d/.test(p))+stat('Symbols',/[^a-zA-Z0-9]/.test(p)?'✓':'✗',/[^a-zA-Z0-9]/.test(p));
      const tips=[]; if(p.length<12)tips.push('Use at least 12 characters'); if(!/[A-Z]/.test(p))tips.push('Add uppercase letters'); if(!/\d/.test(p))tips.push('Add numbers'); if(!/[^a-zA-Z0-9]/.test(p))tips.push('Add symbols (!@#$)'); if(/(.)\1{2,}/.test(p))tips.push('Avoid repeated characters'); if(/^[a-zA-Z]+$/.test(p))tips.push('Mix in numbers and symbols');
      $('tips').innerHTML=tips.map(t=>'<div class="text-slate-400"><i class="fa-solid fa-circle-info mr-1 text-xs" style="color:#fbbf24"></i>'+t+'</div>').join(''); }
  </script>
  <script>function closeDisclaimer(){var m=document.getElementById("disclaimer-modal");if(!m)return;m.style.opacity="0";setTimeout(function(){m.style.display="none";},300);}</script>
